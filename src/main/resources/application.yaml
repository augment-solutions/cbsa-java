spring:
  application:
    name: cbsa-java
  datasource:
    url: ${COCKROACH_URL:jdbc:postgresql://localhost:26257/cbsa?sslmode=disable}
    username: ${COCKROACH_USER:root}
    password: ${COCKROACH_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
  flyway:
    enabled: true
    locations: classpath:db/migration
  jooq:
    sql-dialect: POSTGRES
  threads:
    virtual:
      enabled: true

cbsa:
  sortcode: "987654"

management:
  endpoints:
    web:
      exposure:
        include: health,info
